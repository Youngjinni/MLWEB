server.port=${GATEWAY_PORT}
spring.application.name=gateway-service

# CORS 설정 (패턴이 더 안전합니다)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# ---------------------------------------------------------
# [라우팅 설정 수정]
# ---------------------------------------------------------

# 1. 인증 서비스 (Path를 프론트 요청에 맞게 /auth/** 로 수정)
spring.cloud.gateway.routes[0].id=authservice
spring.cloud.gateway.routes[0].uri=http://authservice:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 2. 커뮤니티 서비스
spring.cloud.gateway.routes[1].id=communityservice
spring.cloud.gateway.routes[1].uri=http://communityservice:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/community/**

# 3. LSTM 분석 서비스
spring.cloud.gateway.routes[2].id=lstmanalysis
spring.cloud.gateway.routes[2].uri=http://lstmservice:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/analysis/lstm/**

# 4. RF 분석 서비스
spring.cloud.gateway.routes[3].id=rfanalysis
spring.cloud.gateway.routes[3].uri=http://rfservice:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/analysis/rf/**