server.port=8080
spring.application.name=gateway-service

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization,Content-Disposition

# 💡 혹시 모르니 이것도 추가 (Preflight 요청 최적화)
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# ---------------------------------------------------------
# [전체 모듈 통합 라우팅 설정]
# ---------------------------------------------------------

# 1. 인증 서비스 (Auth-Service: 8081)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. 커뮤니티 서비스 (Community-Service: 8082)
spring.cloud.gateway.routes[1].id=community-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/community/**

# 3. LSTM 분석 서비스 (Lstm-Analysis: 8083)
spring.cloud.gateway.routes[2].id=lstm-analysis
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/analysis/lstm/**

# 4. RF 분석 서비스 (Rf-Analysis: 8084)
spring.cloud.gateway.routes[3].id=rf-analysis
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/analysis/rf/**